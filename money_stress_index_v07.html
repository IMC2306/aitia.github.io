<!doctype html>
<!--
  Purpose: MSI v07 is a standalone Money Stress Index prototype for mapping financial pressure, resilience, confidence, clusters, and support needs.
  Version: MSI v0.7.
  Scope exclusions: no regulated advice, debt advice, legal advice, health advice, eligibility decisions, product recommendations, paid solutions, or product-specific application workflows.
  Privacy assumption: answers are processed only in this browser while the prototype is open; they are not saved, submitted, tracked, uploaded, or sent anywhere by default.
  Method summary: MSI combines FCA-style money-stress constructs, ONS-style problem-debt proxies, subjective financial wellbeing sliders, spending-power proxies, behavioural/admin strain indicators, optional GHQ-style wellbeing context, and a composite financial radar.
  Prototype warning: scoring, routing, radar layer gaps, and wellbeing context are unvalidated prototype outputs and require expert review before real use.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MSI - Money Stress Index v0.7</title>
  <style>
    :root {
      --ink: #182026;
      --muted: #5f6f73;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --line: #d9ded9;
      --primary: #2f6f73;
      --primary-dark: #224f52;
      --sage: #6f8f72;
      --ochre: #b68a2c;
      --terracotta: #b85c45;
      --slate: #536878;
      --bluegrey: #70889a;
      --focus: #f4c430;
      --soft: #f0f3ee;
      --radius: 9px;
      --shadow: 0 12px 32px rgba(24, 32, 38, .08);
      --max: 1040px;
      --s1: 4px;
      --s2: 8px;
      --s3: 12px;
      --s4: 16px;
      --s5: 24px;
      --s6: 32px;
      --s7: 44px;
    }

    body[data-theme="dark"] {
      --ink: #e8ece8;
      --muted: #b5c1bc;
      --paper: #151b1d;
      --panel: #20282a;
      --line: #394345;
      --primary: #75aeb0;
      --primary-dark: #9dc8c9;
      --sage: #9cbf9f;
      --ochre: #d5ad55;
      --terracotta: #d58a75;
      --slate: #9aadb9;
      --bluegrey: #a8b8c2;
      --soft: #1a2224;
      --shadow: 0 16px 34px rgba(0, 0, 0, .24);
    }

    * { box-sizing: border-box; }
    html { background: var(--paper); scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, var(--paper), #f5f4ed 540px, var(--paper));
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    body[data-theme="dark"] {
      background: linear-gradient(180deg, var(--paper), #192123 540px, var(--paper));
    }

    body[data-layout="mobile"] .shell { max-width: 760px; }
    body[data-layout="mobile"] .summary-rail { position: static; }
    body[data-layout="mobile"] .setup-layout,
    body[data-layout="mobile"] .assessment-layout { grid-template-columns: 1fr; }
    body[data-layout="mobile"] .module-grid,
    body[data-layout="mobile"] .choice-grid,
    body[data-layout="mobile"] .panel-grid,
    body[data-layout="mobile"] .mini-grid { grid-template-columns: 1fr; }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:focus, input:focus, select:focus, textarea:focus, summary:focus {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    a { color: var(--primary-dark); }
    h1, h2, h3, h4 { margin: 0 0 var(--s3); line-height: 1.15; letter-spacing: 0; }
    h1 { font-size: clamp(2.35rem, 5vw, 4.2rem); }
    h2 { font-size: clamp(1.45rem, 2.4vw, 2rem); }
    h3 { font-size: 1.18rem; }
    h4 { font-size: 1rem; }
    p { margin: 0 0 var(--s3); }
    ul, ol { margin-top: 0; padding-left: 1.2rem; }
    li { margin-bottom: 7px; }

    .shell {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding: var(--s6) var(--s5) var(--s7);
    }

    .muted { color: var(--muted); }
    .small { font-size: .92rem; }
    .tiny { font-size: .82rem; }
    .hidden { display: none !important; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .intro {
      padding: var(--s7) 0 var(--s6);
      border-bottom: 1px solid var(--line);
    }

    .intro .lead {
      max-width: 760px;
      font-size: clamp(1.1rem, 1.6vw, 1.35rem);
      color: #324247;
    }

    .toolbar, .button-row, .copy-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s3);
      align-items: center;
    }

    .button-row { margin-top: var(--s5); }

    button, .button-like {
      min-height: 44px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    button.primary:hover, button.primary:focus { background: var(--primary-dark); }
    button.secondary { border-color: var(--primary); color: var(--primary-dark); }
    button.quiet { border: 0; background: transparent; color: var(--primary-dark); padding-inline: 4px; }
    button.danger { color: #6f2b1e; border-color: #d8b3a9; background: #fff8f5; }

    .card, .panel, .module-card, .section-card, .question-card, .result-card, .resource-card, .action-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card, .panel, .module-card, .section-card, .result-card {
      padding: var(--s5);
    }

    .intro-cards, .module-grid, .mini-grid, .panel-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--s4);
      margin-top: var(--s5);
    }

    .module-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .panel-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    details {
      border-radius: var(--radius);
    }

    details > summary {
      cursor: pointer;
      font-weight: 800;
      list-style-position: outside;
      padding: var(--s2) 0;
    }

    .setup-head, .assessment-head, .result-head {
      margin: var(--s6) 0 var(--s5);
      padding-bottom: var(--s4);
      border-bottom: 1px solid var(--line);
    }

    .setup-layout, .assessment-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: var(--s5);
      align-items: start;
    }

    .summary-rail {
      position: sticky;
      top: var(--s5);
      display: grid;
      gap: var(--s4);
    }

    .summary-rail .card { padding: var(--s4); box-shadow: none; }

    .module-card {
      padding: var(--s4);
      box-shadow: none;
    }

    .module-title {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--s3);
      align-items: start;
    }

    .module-title input { width: 22px; height: 22px; margin-top: 2px; accent-color: var(--primary); }
    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: var(--s2) 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8f8f2;
      color: #354448;
      font-size: .82rem;
      font-weight: 700;
    }

    .tag.caution { color: #60420f; background: #fff8e6; border-color: #ecd99a; }
    .tag.good { color: #36583a; background: #eef6ed; border-color: #cdddc9; }
    .tag.context { color: #405161; background: #eef3f5; border-color: #ccd7dc; }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0;
      min-width: 0;
    }

    legend {
      font-weight: 800;
      padding: 0;
      margin-bottom: var(--s3);
    }

    .setup-question, .question-card {
      padding: var(--s4);
      margin-bottom: var(--s4);
      box-shadow: none;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--s3);
    }

    .choice-card, .chip, .scenario-card {
      position: relative;
      display: block;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffefb;
      padding: var(--s3);
    }

    .choice-card input, .chip input, .scenario-card input {
      position: absolute;
      inset: var(--s3) auto auto var(--s3);
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
    }

    .choice-card span, .scenario-card span {
      display: block;
      padding-left: 30px;
      font-weight: 700;
    }

    .choice-card small, .scenario-card small {
      display: block;
      padding-left: 30px;
      color: var(--muted);
      margin-top: 3px;
    }

    .choice-card:has(input:checked), .chip:has(input:checked), .scenario-card:has(input:checked) {
      border-color: var(--primary);
      background: #eef6f4;
      box-shadow: inset 0 0 0 2px rgba(47, 111, 115, .16);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s2);
    }

    .chip {
      width: auto;
      padding: 11px 13px 11px 42px;
      font-weight: 750;
    }

    .slider-wrap { margin-top: var(--s3); }
    .slider-head {
      display: flex;
      justify-content: space-between;
      gap: var(--s3);
      align-items: baseline;
      margin-bottom: var(--s2);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }

    .anchors {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: var(--s2);
      margin-top: var(--s2);
      color: var(--muted);
      font-size: .78rem;
    }

    .anchors span:nth-child(3) { text-align: center; }
    .anchors span:nth-child(n+4) { text-align: right; }
    .live-interpretation {
      margin-top: var(--s2);
      padding: var(--s3);
      border-left: 4px solid var(--primary);
      background: #f3f7f5;
      border-radius: 6px;
    }

    .axis-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--s2);
      margin-top: var(--s3);
    }

    .axis-option {
      min-height: 74px;
      padding: var(--s3);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffefb;
      text-align: left;
    }

    .axis-option[aria-pressed="true"] {
      border-color: var(--primary);
      background: #eef6f4;
    }

    .allocation-row {
      display: grid;
      grid-template-columns: 160px 1fr 44px;
      gap: var(--s3);
      align-items: center;
      margin: var(--s3) 0;
    }

    .priority-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--s3);
    }

    .priority-grid label {
      display: grid;
      gap: var(--s2);
      font-weight: 800;
    }

    .why-question {
      margin-top: var(--s3);
      padding: var(--s3);
      background: #fbfaf6;
      border: 1px dashed var(--line);
    }

    .section-card {
      margin-bottom: var(--s4);
      padding: var(--s4) var(--s5);
    }

    .section-card > summary {
      display: flex;
      justify-content: space-between;
      gap: var(--s4);
      align-items: baseline;
    }

    .section-status {
      font-weight: 700;
      color: var(--muted);
      font-size: .9rem;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e7ebe5;
      overflow: hidden;
      margin: var(--s2) 0;
    }

    .progress-fill {
      display: block;
      height: 100%;
      background: var(--primary);
      width: 0;
      transition: width .35s ease;
    }

    .notice {
      padding: var(--s4);
      border: 1px solid var(--line);
      border-left: 5px solid var(--slate);
      border-radius: 8px;
      background: #f8faf8;
      margin-bottom: var(--s4);
    }

    .notice.caution { border-left-color: var(--ochre); background: #fffaf0; }
    .notice.urgent { border-left-color: var(--terracotta); background: #fff6f2; }
    .notice.good { border-left-color: var(--sage); background: #f3f8f2; }

    .result-card {
      margin: var(--s5) 0;
      padding: var(--s6);
      box-shadow: var(--shadow);
    }

    .result-kicker {
      color: var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 850;
      font-size: .78rem;
      margin-bottom: var(--s2);
    }

    .result-main {
      font-size: clamp(1.8rem, 3vw, 2.55rem);
      font-weight: 850;
      margin-bottom: var(--s2);
    }

    .accordion-list {
      display: grid;
      gap: var(--s3);
    }

    .result-accordion {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: none;
      overflow: clip;
    }

    .result-accordion > summary {
      padding: var(--s4) var(--s5);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 2px;
      background: #fffefb;
    }

    .result-accordion[open] > summary {
      border-bottom: 1px solid var(--line);
    }

    .result-accordion .preview {
      font-weight: 500;
      color: var(--muted);
      font-size: .94rem;
    }

    .accordion-body { padding: var(--s5); }

    .action-card, .resource-card {
      padding: var(--s4);
      box-shadow: none;
      margin-bottom: var(--s3);
    }

    .radar-area {
      display: grid;
      gap: var(--s5);
    }

    .radar-box {
      padding: var(--s4);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffefb;
    }

    .radar-svg {
      width: min(640px, 100%);
      display: block;
      margin: 0 auto;
      overflow: visible;
    }

    .radar-ring { fill: none; stroke: #dfe5dd; stroke-width: 1.2; }
    .radar-axis { stroke: #d7ddd5; stroke-width: 1; }
    .radar-label { font-size: 10px; fill: var(--ink); font-weight: 800; text-anchor: middle; }
    .radar-pressure { fill: rgba(184, 92, 69, .20); stroke: var(--terracotta); stroke-width: 2.2; }
    .radar-resilience { fill: rgba(111, 143, 114, .20); stroke: var(--sage); stroke-width: 2.2; }
    .radar-confidence { fill: rgba(83, 104, 120, .16); stroke: var(--slate); stroke-width: 2.2; stroke-dasharray: 4 4; }
    .radar-missing { fill: #fff; stroke: var(--ochre); stroke-width: 2; }
    .radar-threshold { fill: none; stroke: var(--ochre); stroke-width: 1.2; stroke-dasharray: 5 5; }
    .radar-hotspot {
      fill: transparent;
      stroke: transparent;
      cursor: pointer;
    }
    .radar-hotspot:focus, .radar-hotspot:hover {
      stroke: var(--focus);
      stroke-width: 3;
      outline: none;
    }
    .axis-chip-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: var(--s2);
      margin-top: var(--s3);
    }
    .axis-chip-grid button[aria-pressed="true"] {
      background: #eef6f4;
      border-color: var(--primary);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s3);
      align-items: center;
      margin: var(--s3) 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .legend-dot {
      display: inline-block;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: -2px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th { background: #f4f6f2; }

    .info-hint {
      position: relative;
      display: inline-flex;
      vertical-align: middle;
      margin-left: 4px;
    }

    .info-button {
      width: 25px;
      min-height: 25px;
      height: 25px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--slate);
      color: var(--primary-dark);
      background: #f7faf8;
      font-size: .82rem;
      line-height: 1;
    }

    .hint-panel {
      position: absolute;
      z-index: 30;
      top: calc(100% + 8px);
      left: 0;
      width: min(280px, 80vw);
      padding: var(--s3);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      color: var(--ink);
      font-size: .9rem;
      font-weight: 500;
      opacity: 1;
      transition: opacity .16s ease, transform .16s ease;
    }

    body[data-theme="dark"] .card,
    body[data-theme="dark"] .panel,
    body[data-theme="dark"] .module-card,
    body[data-theme="dark"] .section-card,
    body[data-theme="dark"] .result-card,
    body[data-theme="dark"] .result-accordion,
    body[data-theme="dark"] .choice-card,
    body[data-theme="dark"] .chip,
    body[data-theme="dark"] .scenario-card,
    body[data-theme="dark"] .radar-box,
    body[data-theme="dark"] .hint-panel,
    body[data-theme="dark"] .copy-box {
      background: var(--panel);
      color: var(--ink);
    }

    body[data-theme="dark"] .choice-card:has(input:checked),
    body[data-theme="dark"] .chip:has(input:checked),
    body[data-theme="dark"] .scenario-card:has(input:checked) {
      background: #263537;
    }

    .copy-box {
      width: 100%;
      min-height: 150px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: var(--s3);
      resize: vertical;
      background: #fffefb;
    }

    .toast {
      position: fixed;
      right: var(--s5);
      bottom: var(--s5);
      padding: var(--s3) var(--s4);
      background: var(--primary-dark);
      color: #fff;
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: 50;
    }

    @media (max-width: 860px) {
      .shell { padding: var(--s5) var(--s4) var(--s7); }
      .setup-layout, .assessment-layout { grid-template-columns: 1fr; }
      .summary-rail { position: static; }
      .intro-cards, .module-grid, .mini-grid, .panel-grid, .choice-grid, .priority-grid { grid-template-columns: 1fr; }
      .allocation-row { grid-template-columns: 1fr; gap: var(--s2); }
      .section-card > summary { display: block; }
      table { min-width: 620px; }
    }

    @media (max-width: 520px) {
      .axis-grid { grid-template-columns: 1fr; }
      .anchors { font-size: .7rem; }
      .result-card { padding: var(--s4); }
      .result-accordion > summary, .accordion-body { padding: var(--s4); }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }

    @media print {
      body, html { background: #fff; }
      .shell { width: 100%; max-width: none; padding: 0; }
      .no-print, .toast, .info-hint { display: none !important; }
      .result-accordion { break-inside: avoid; }
      .result-accordion:not([open]) .accordion-body { display: block; }
      details:not([open]) > *:not(summary) { display: block; }
      .card, .result-card, .section-card, .result-accordion { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main id="app" tabindex="-1"></main>
  </div>
  <div id="live-region" class="sr-only" aria-live="polite"></div>

  <script>
    const CONFIG = {
      version: "MSI v0.7",
      generated: () => new Date().toLocaleDateString("en-GB", { year: "numeric", month: "short", day: "numeric" }),
      bands: {
        pressure: [
          { max: 24, label: "Low current pressure", tone: "good" },
          { max: 44, label: "Some pressure", tone: "caution" },
          { max: 64, label: "Pressure building", tone: "caution" },
          { max: 82, label: "High pressure", tone: "urgent" },
          { max: 100, label: "Acute pressure", tone: "urgent" }
        ],
        resilience: [
          { max: 24, label: "Very limited buffer", tone: "urgent" },
          { max: 44, label: "Limited buffer", tone: "caution" },
          { max: 64, label: "Some buffer", tone: "caution" },
          { max: 82, label: "Good buffer", tone: "good" },
          { max: 100, label: "Strong buffer", tone: "good" }
        ],
        confidence: [
          { max: 34, label: "Low confidence: key details missing" },
          { max: 54, label: "Broad indication" },
          { max: 74, label: "Medium confidence" },
          { max: 100, label: "Detailed indication" }
        ],
        wellbeing: [
          { max: 8, label: "Low wellbeing strain context" },
          { max: 16, label: "Some wellbeing strain context" },
          { max: 26, label: "High wellbeing strain context" },
          { max: 36, label: "Very high wellbeing strain context" }
        ]
      }
    };

    const QUESTION_TYPES = {
      singleChoiceCard: "singleChoiceCard",
      multiSelectChips: "multiSelectChips",
      precisionSlider: "precisionSlider",
      ghqChoice: "ghqChoice",
      textNote: "textNote",
      guidedThreeStep: "guidedThreeStep",
      twoAxisGrid: "twoAxisGrid",
      allocationSplit: "allocationSplit",
      scenarioTiles: "scenarioTiles",
