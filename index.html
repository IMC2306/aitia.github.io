<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyprus Style Extreme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1613395877344-13d4a8e0d049?w=1200&q=80') center/cover no-repeat;
            background-attachment: fixed;
        }
        
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 3.5rem;
            color: #d4a574;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #555;
            margin-top: 1rem;
            font-style: italic;
        }
        
        .cyprus-accent {
            display: inline-block;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #007bff, #ffc107, #ff6b6b);
            border-radius: 2px;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cyprus Style Extreme</h1>
        <div class="cyprus-accent"></div>
        <p class="subtitle">Welcome to the Mediterranean Lifestyle</p>
    </div>
</body>
</html>
